suite: PVC
templates:
  - pvc.yaml
tests:
  - it: renders a PVC by default
    values:
      - ../ci/simple-values.yaml
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - matchRegex:
          path: metadata.name
          pattern: -data$
      - equal:
          path: spec.accessModes
          value:
            - ReadWriteOnce

  - it: is not rendered when existingClaim is set
    values:
      - ../ci/existing-pvc-values.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: commonLabels propagate to the PVC metadata
    values:
      - ../ci/metadata-values.yaml
    asserts:
      - equal:
          path: metadata.labels.custom/common-label
          value: common-value
