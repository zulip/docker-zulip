---
name: Build and push images to ghcr.io/zulip/zulip-server

on:
  push:
    branches:
      - main
    tags:
      - "ghcr-[0-9]*.[0-9]*-[0-9]*"

permissions: {}

env:
  PACKAGE_NAME: ghcr.io/zulip/zulip-server

jobs:
  build:
    if: github.repository_owner == 'zulip'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.PACKAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=match,pattern=ghcr-(\d+\.\d+-\d+),group=1
          labels: |
            org.opencontainers.image.description=Zulip Server
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/zulip/docker-zulip/${{ github.sha }}/README.md
          annotations: |
            org.opencontainers.image.description=Zulip Server
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get commit SHA for current 11.x tip
        id: tip-sha
        if: github.ref_type == 'branch'
        run: |
          COMMIT=$(git ls-remote https://github.com/zulip/zulip.git refs/heads/11.x | cut -f1)
          echo "override=ZULIP_GIT_REF=$COMMIT" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          pull: true
          tags: ${{ env.PACKAGE_NAME }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            ${{ steps.tip-sha.outputs.override }}
          cache-from: type=registry,ref=ghcr.io/zulip/zulip-server:buildcache-${{ env.PLATFORM_PAIR }}
          cache-to: type=registry,ref=ghcr.io/zulip/zulip-server:buildcache-${{ env.PLATFORM_PAIR }},mode=max
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="$DIGEST"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.PACKAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=match,pattern=ghcr-(\d+\.\d+-\d+),group=1
          annotations: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/zulip/docker-zulip/${{ github.sha }}/README.md
            org.opencontainers.image.description=Zulip Server
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -x
          IFS=$'\n'
          ANNOTATIONS_LIST=($DOCKER_METADATA_OUTPUT_ANNOTATIONS)
          TAGS_LIST=($DOCKER_METADATA_OUTPUT_TAGS)
          docker buildx imagetools create \
            $(for tag in "${TAGS_LIST[@]}"; do echo "--tag"; echo "$tag"; done) \
            $(for annotation in "${ANNOTATIONS_LIST[@]}"; do echo "--annotation"; echo "$annotation"; done) \
            $(for reference in *; do printf "${PACKAGE_NAME}@sha256:%s\n" $reference; done)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${PACKAGE_NAME}:${STEPS_META_OUTPUTS_VERSION}
        env:
          STEPS_META_OUTPUTS_VERSION: ${{ steps.meta.outputs.version }}
