---
name: Lint markdown files prettier

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - run: npm install && npx prettier --write "**/*.md" ".*/**.md"
      - name: Check for any diff
        run: |
          if ! git diff HEAD --exit-code; then
            echo "Changes found!"
            git status
            git diff HEAD
            exit 1
          fi
